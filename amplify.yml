version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci

    build:
      commands:
        # expose only the SPAPI vars to Next runtime
        - env | grep SPAPI_LWA >> .env.production
        - npm run build

  artifacts:
    baseDirectory: .next
    files:
      - '**/*'

  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*